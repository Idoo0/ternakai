<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <!-- Layer group icon (3 stacked rectangles) -->
  <g fill="url(#icon)">
    <!-- Top layer -->
    <rect x="136" y="156" width="240" height="48" rx="12"/>
    <!-- Middle layer -->
    <rect x="136" y="232" width="240" height="48" rx="12"/>
    <!-- Bottom layer -->
    <rect x="136" y="308" width="240" height="48" rx="12"/>
    <!-- Right accent dot -->
    <circle cx="396" cy="180" r="16" fill="#05090f" opacity="0.35"/>
    <circle cx="396" cy="256" r="16" fill="#05090f" opacity="0.35"/>
    <circle cx="396" cy="332" r="16" fill="#05090f" opacity="0.35"/>
  </g>
</svg>
